<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТАОМЛАР МЕНЮСИ - DELPHINE</title>
    <style>
        :root { 
            --gold: #ffd700; 
            --dark-bg: rgba(0, 0, 0, 0.9); 
            --card-bg: #1a1a1a; 
            --green: #2ed573; 
        }
        
        body { 
            background: linear-gradient(var(--dark-bg), var(--dark-bg)), 
                        url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1600&auto=format&fit=crop');
            background-size: cover; 
            background-attachment: fixed;
            background-position: center;
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            padding: 10px;
        }

        /* АСОСИЙ САҲИФАГА ТУГМАСИ */
        .nav-container { margin: 20px 0; text-align: center; }
        .home-link { 
            display: inline-block; 
            background: rgba(255, 215, 0, 0.15); 
            color: var(--gold); 
            padding: 10px 25px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: bold; 
            border: 1px solid var(--gold);
            transition: 0.3s;
        }
        .home-link:hover { background: var(--gold); color: black; }

        h1 { color: var(--gold); font-size: 2rem; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        /* ЭКРАНГА ҚАРАБ МОСЛАШУВЧАН СЕТКА (GRID) */
        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1200px; 
            margin: 0 auto 50px;
            padding: 0 10px;
        }
        
        /* ТАОМ КАРТОЧКАСИ */
        .food-card { 
            background: var(--card-bg); 
            border: 1px solid var(--gold); 
            border-radius: 25px; 
            padding: 25px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .food-card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(255, 215, 0, 0.2); }
        
        .food-img-container {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            overflow: hidden;
            margin-bottom: 15px;
            background: #222;
        }
        .food-img { width: 100%; height: 100%; object-fit: cover; }
        
        .food-title { color: var(--gold); font-size: 1.5rem; font-weight: bold; margin: 10px 0; }
        .food-desc { color: #aaa; font-size: 0.9rem; margin-bottom: 10px; }
        .food-price { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: #fff; }
        
        .portion-box { width: 100%; margin-bottom: 15px; }
        select { 
            width: 100%; 
            padding: 12px; 
            background: #222; 
            color: white; 
            border: 1px solid #444; 
            border-radius: 12px; 
            font-size: 1rem;
            text-align: center;
        }
        
        .order-btn { 
            background: var(--green); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            font-size: 1rem;
            text-transform: uppercase;
            transition: 0.2s; 
        }
        .order-btn:active { transform: scale(0.96); }

        /* МОДАЛ ОЙНА (БУЮРТМА УЧУН) */
        #order-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; 
        }
        .modal-content { 
            background: #1a1a1a; padding: 35px 25px; border-radius: 25px; 
            border: 1px solid var(--gold); width: 90%; max-width: 400px; text-align: center;
        }
        .modal-content input { 
            width: 100%; padding: 15px; margin: 10px 0; background: #222; 
            border: 1px solid #444; color: white; border-radius: 12px; box-sizing: border-box; font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="nav-container">
        <a href="index.html" class="home-link">← АСОСИЙ САҲИФАГА ҚАЙТИШ</a>
    </div>

    <h1>Таомлар менюси</h1>

    <div class="menu-grid">
        <div class="food-card">
            <div class="food-img-container">
                <img src="plov.jpg" class="food-img" alt="Ош">
            </div>
            <div class="food-title">Ош</div>
            <div class="food-desc">Хизмат ҳақи билан бирга</div>
            <div class="food-price">25,000 сўм</div>
            <div class="portion-box">
                <select id="p-osh">
                    <option value="1 порция">1 порция</option>
                    <option value="2 порция">2 порция</option>
                    <option value="3 порция">3 порция</option>
                    <option value="4 порция">4 порция</option>
                    <option value="5 порция">5 порция</option>
                    <option value="6 порция">6 порция</option>
                    <option value="7 порция">7 порция</option>
                    <option value="8 порция">8 порция</option>
                    <option value="9 порция">9 порция</option>
                    <option value="10 порция">10 порция</option>
                    <option value="11 порция">11 порция</option>
                    <option value="12 порция">12 порция</option>
                </select>
            </div>
            <button class="order-btn" onclick="openOrder('Ош', 'p-osh')">Буюртма бериш</button>
        </div>

        <div class="food-card">
            <div class="food-img-container">
                <img src="dumshurva.jpg" class="food-img" alt="Шўрва">
            </div>
            <div class="food-title">Шўрва</div>
            <div class="food-desc">Хизмат ҳақи билан бирга</div>
            <div class="food-price">25,000 сўм</div>
            <div class="portion-box">
                <select id="p-shurva">
                    <option value="1 порция">1 порция</option>
                    <option value="2 порция">2 порция</option>
                    <option value="3 порция">3 порция</option>
                    <option value="4 порция">4 порция</option>
                    <option value="5 порция">5 порция</option>
                    <option value="6 порция">6 порция</option>
                    <option value="7 порция">7 порция</option>
                </select>
            </div>
            <button class="order-btn" onclick="openOrder('Шўрва', 'p-shurva')">Буюртма бериш</button>
        </div>

        <div class="food-card">
            <div class="food-img-container">
                <img src="qotirma.jpg" class="food-img" alt="Қотирма">
            </div>
            <div class="food-title">Қотирма</div>
            <div class="food-desc">Хизмат ҳақи билан бирга</div>
            <div class="food-price">30,000 сўм</div>
            <div class="portion-box">
                <select id="p-qotirma">
                    <option value="1 порция">1 порция</option>
                    <option value="2 порция">2 порция</option>
                </select>
            </div>
            <button class="order-btn" onclick="openOrder('Қотирма', 'p-qotirma')">Буюртма бериш</button>
        </div>
    </div>

    <div id="order-modal">
        <div class="modal-content">
            <h3 id="m-food-name" style="color: var(--gold); margin: 0 0 20px;"></h3>
            <input type="text" id="m-name" placeholder="ИСМИНГИЗ">
            <input type="tel" id="m-phone" placeholder="ТЕЛЕФОН (+998...)">
            <button class="order-btn" onclick="sendToTelegram()">ТАСДИҚЛАШ</button>
            <button onclick="closeOrder()" style="background:none; border:none; color: #888; margin-top: 15px; cursor: pointer;">БЕКОР ҚИЛИШ</button>
        </div>
    </div>

    <script>
        let selectedFood = '';
        let selectedPortionId = '';

        function openOrder(name, pId) {
            selectedFood = name;
            selectedPortionId = pId;
            document.getElementById('m-food-name').innerText = name + " - Буюртма қилиш";
            document.getElementById('order-modal').style.display = 'flex';
        }

        function closeOrder() { document.getElementById('order-modal').style.display = 'none'; }

        function sendToTelegram() {
            const name = document.getElementById('m-name').value;
            const phone = document.getElementById('m-phone').value;
            const portion = document.getElementById(selectedPortionId).value;

            if (!name || !phone) { 
                alert("Маълумотни тўлиқ киритинг!"); 
                return; 
            }

            // СОЗЛАМАЛАР ✅
            const botToken = "8762282587:AAETc9himSsrW1XiSR5UVAdvrwS3s9l55F4";
            const channelId = "-1001273563663"; // Сизнинг каналингиз ID-си

            // ХАБАР МАТНИ (HTML форматида)
            const msg = `<b>🍲 ЯНГИ ТАОМ БУЮРТМАСИ</b>\n\n` +
                        `🍱 <b>Таом:</b> ${selectedFood}\n` +
                        `⚖️ <b>Миқдори:</b> ${portion}\n` +
                        `👤 <b>Мижоз:</b> ${name}\n` +
                        `📞 <b>Тел:</b> ${phone}`;

            // ЮБОРИШ
            const url = `https://api.telegram.org/bot${botToken}/sendMessage`;

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: channelId,
                    text: msg,
                    parse_mode: 'HTML'
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.ok) {
                    alert("Раҳмат! Буюртма каналга юборилди.");
                    closeOrder();
                    // Маълумотларни тозалаш
                    document.getElementById('m-name').value = "";
                    document.getElementById('m-phone').value = "";
                } else {
                    alert("Хатолик: " + data.description);
                }
            })
            .catch(err => alert("Алоқа хатоси!"));
        }
    </script>
</body>
</html>
