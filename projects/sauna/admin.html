<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELFIN ADMIN - Secure Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --gold: #ffd700; 
            --dark-overlay: rgba(0, 0, 0, 0.8); 
            --card: rgba(26, 26, 26, 0.95); 
            --red: #ff4757; 
            --green: #2ed573; 
            --blue: #3498db; 
        }
        body { 
            background: linear-gradient(var(--dark-overlay), var(--dark-overlay)), url('delf.jpg');
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 10px; 
            text-align: center; 
            min-height: 100vh;
        }

        /* ЛОГИН ОЙНАСИНИ МАРКАЗЛАШТИРИШ */
        .login-overlay { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 2000; 
        }

        .login-card { 
            background: var(--card); 
            padding: 40px 30px; 
            border-radius: 25px; 
            border: 2px solid var(--gold); 
            width: 90%; 
            max-width: 380px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7); 
        }

        /* ИНПУТНИ ТЎҒИРЛАШ */
        input { 
            box-sizing: border-box; /* Четга чиқиб кетмаслиги учун энг муҳим қатор */
            width: 100%; 
            padding: 16px; 
            margin: 20px 0; 
            background: rgba(0,0,0,0.5); 
            border: 1px solid #555; 
            color: white; 
            border-radius: 15px; 
            text-align: center; 
            font-size: 1.1rem; 
        }

        .admin-container { width: 100%; max-width: 1000px; display: none; margin: auto; padding-top: 20px; }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 10px; }
        
        .nav-btn { 
            background: rgba(255, 215, 0, 0.1); 
            color: var(--gold); 
            border: 1px solid var(--gold); 
            padding: 12px 20px; 
            border-radius: 50px; 
            cursor: pointer; 
            text-decoration: none; 
            font-size: 0.9rem; 
            font-weight: bold; 
            transition: 0.3s; 
        }
        .nav-btn:hover { background: var(--gold); color: black; }

        .logout-btn { background: var(--red); color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .settings-bar { background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 15px; border-left: 8px solid var(--gold); }
        select { background: #222; color: white; border: 1px solid #444; padding: 12px; border-radius: 12px; font-size: 1rem; cursor: pointer; }
        
        .rooms-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .room-card { background: var(--card); border-radius: 25px; padding: 25px; border: 1px solid #333; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.4); transition: 0.3s; }
        .room-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        
        .kitchen-card { border-color: var(--blue) !important; }
        .room-num { font-size: 1.5rem; font-weight: bold; color: var(--gold); margin-bottom: 8px; }
        
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        .status-busy { background: rgba(255, 71, 87, 0.2); color: var(--red); border: 1px solid var(--red); }
        .status-free { background: rgba(46, 213, 115, 0.2); color: var(--green); border: 1px solid var(--green); }
        
        .timer-box { font-size: 2.5rem; font-family: 'Courier New', monospace; color: var(--gold); margin: 15px 0; font-weight: bold; }
        
        .action-btn { width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .btn-busy { background: var(--red); color: white; }
        .btn-free { background: var(--green); color: white; }
    </style>
</head>
<body>

<div id="login-overlay" class="login-overlay">
    <div class="login-card">
        <h2 style="color: var(--gold); margin-bottom: 10px;">АДМИН КИРИШ</h2>
        <input type="password" id="admin-pass" placeholder="Паролни киритинг">
        <button class="action-btn btn-free" onclick="checkUnlock()">КИРИШ</button>
        <a href="index.html" style="display: block; margin-top: 15px; color: #888; text-decoration: none; font-size: 0.8rem;">← АСОСИЙ САҲИФА</a>
    </div>
</div>

<div id="admin-main" class="admin-container">
    <div class="header-box">
        <a href="index.html" class="nav-btn">🏠 АСОСИЙ САҲИФА</a>
        <h1 style="color: var(--gold); margin: 0;">DELFIN CONTROL</h1>
        <button class="logout-btn" onclick="location.reload()">ЧИҚИШ</button>
    </div>

    <div class="settings-bar">
        <span>⏰ САУНА ВАҚТИ:</span>
        <select id="duration">
            <option value="60">1 соат</option>
            <option value="90">1:30 соат</option>
            <option value="120">2 соат</option>
            <option value="150">2:30 соат</option>
            <option value="180">3 соат</option>
        </select>
    </div>

    <div id="rooms-list" class="rooms-grid"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyABO4zuo6GnSNWld4y0H91VI1QSgQewtRU",
        databaseURL: "https://adminsaunadelfin-default-rtdb.europe-west1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkUnlock() {
        if(document.getElementById('admin-pass').value === "1234") { 
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-main').style.display = 'block';
        } else { alert("Парол хато!"); }
    }

    db.ref('rooms/').on('value', (snapshot) => {
        const data = snapshot.val();
        const grid = document.getElementById('rooms-list');
        grid.innerHTML = '';
        for (let i = 1; i <= 8; i++) {
            const id = 's' + i;
            const isKitchen = i > 5;
            const roomName = isKitchen ? (i-5) + "-ОШХОНА" : i + "-САУНА";
            const room = data && data[id] ? data[id] : { status: 'БЎШ' };
            const isBusy = room.status === 'БАНД';

            grid.innerHTML += `
                <div class="room-card ${isKitchen ? 'kitchen-card' : ''}">
                    <div class="room-num">${roomName}</div>
                    <div class="status-badge ${isBusy ? 'status-busy' : 'status-free'}">${room.status}</div>
                    <div id="timer-${i}" class="timer-box" style="${isKitchen ? 'display:none' : ''}">00:00:00</div>
                    <button class="action-btn ${isBusy ? 'btn-busy' : 'btn-free'}" onclick="updateStatus(${i}, '${room.status}')">
                        ${isBusy ? 'ОЧИШ' : 'БАНД ҚИЛИШ'}
                    </button>
                </div>`;
        }
    });

    function updateStatus(num, current) {
        const id = 's' + num;
        const botToken = "8767447087:AAHcyLpGNyS7obTs8TTUUYl-pny1t73n-RI";
        const channelId = "-1002324796336"; 
        const isKitchen = num > 5;
        const roomName = isKitchen ? (num-5) + "-ОШХОНА" : num + "-САУНА";
        let nextStatus = (current === 'БАНД') ? 'БЎШ' : 'БАНД';

        if(current === 'БАНД') {
            db.ref('rooms/' + id).update({ status: 'БЎШ', until: null });
        } else {
            const mins = parseFloat(document.getElementById('duration').value);
            const untilTime = isKitchen ? null : Date.now() + (mins * 60000);
            db.ref('rooms/' + id).update({ status: 'БАНД', until: untilTime });
        }

        const emoji = nextStatus === 'БАНД' ? '🔴' : '🟢';
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: channelId,
                text: `${emoji} <b>ҲОЛАТ ЎЗГАРДИ</b>\n🏠 <b>${roomName}</b>: ${nextStatus}`,
                parse_mode: "HTML"
            })
        });
    }

    setInterval(() => {
        db.ref('rooms/').once('value', (s) => {
            const d = s.val(); if(!d) return;
            for(let i=1; i<=5; i++) {
                const r = d['s'+i];
                const el = document.getElementById('timer-'+i);
                if(r && r.status === 'БАНД' && r.until) {
                    const diff = r.until - Date.now();
                    if(diff > 0) {
                        const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                        const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                        const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                        if(el) el.innerText = `${h}:${m}:${s}`;
                    } else { db.ref('rooms/s'+i).update({status:'БЎШ', until:null}); }
                } else { if(el) el.innerText = "00:00:00"; }
            }
        });
    }, 1000);
</script>
</body>
</html>
