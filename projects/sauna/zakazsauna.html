<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAUNA DELPHINE - Брон қилиш</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --orange: #ff6600; --dark: #0b0b0b; --card: #1a1a1a; --green: #2ed573; }
        body { background: var(--dark); color: white; font-family: sans-serif; text-align: center; padding: 10px; margin: 0; }
        .order-card { background: var(--card); border: 1px solid var(--orange); border-radius: 20px; padding: 20px; max-width: 450px; margin: 20px auto; box-sizing: border-box; }
        .exit-link { display: block; text-align: left; color: #888; text-decoration: none; font-size: 0.9rem; margin-bottom: 15px; }
        .selector-label { margin: 15px 0 5px; display: block; color: #aaa; font-size: 0.8rem; text-align: left; text-transform: uppercase; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .s-btn { padding: 12px 5px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.85rem; transition: 0.2s; }
        .s-btn.busy { background: #333; color: #666; cursor: not-allowed; border: 1px solid #ff4757; }
        .s-btn.free { background: #222; color: var(--green); border: 1px solid var(--green); }
        .s-btn.selected { background: var(--orange); color: white; transform: scale(1.05); }
        input, select { width: 100%; padding: 12px; margin: 5px 0; background: #222; border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .confirm-btn { width: 100%; padding: 16px; background: var(--orange); border: none; color: white; font-weight: bold; border-radius: 12px; cursor: pointer; margin-top: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="order-card">
    <a href="index.html" class="exit-link">← ОРТГА ҚАЙТИШ</a>
    <h2 style="margin: 0 0 15px;">SAUNA <span style="color:var(--orange)">DELPHINE</span></h2>
    
    <label class="selector-label">САУНАНИ ТАНЛАНГ:</label>
    <div id="sauna-btns" class="btn-grid"></div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left;">
        <div>
            <label class="selector-label">МАССАЖ:</label>
            <select id="massage-service">
                <option value="Керак эмас">Йўқ</option>
                <option value="КЕРАК">КЕРАК</option>
                <option value="КЕРАКМАС">КЕРАКМАС</option>
            </select>
        </div>
        <div>
            <label class="selector-label">ОШХОНА:</label>
            <select id="food-room">
                <option value="Керак эмас">Йўқ</option>
                <option value="1-Ошхона">1-хона</option>
                <option value="2-Ошхона">2-хона</option>
                <option value="3-Ошхона">3-хона</option>
            </select>
        </div>
    </div>

    <input type="text" placeholder="ИСМИНГИЗ" id="u-name">
    <input type="tel" placeholder="+998" id="u-phone">
    
    <div style="display: flex; gap: 10px; text-align: left;">
        <div style="flex: 1.5;">
            <label class="selector-label">КЕЛИШ ВАҚТИ:</label>
            <input type="datetime-local" id="u-time">
        </div>
        <div style="flex: 1;">
            <label class="selector-label">КИШИ СОНИ:</label>
            <input type="number" value="1" id="u-count">
        </div>
    </div>

    <button class="confirm-btn" onclick="sendOrder()">БУЮРТМАНИ ТАСДИҚЛАШ</button>
</div>

    <script>
    // 1. FIREBASE СОЗЛАМАЛАРИ
    const firebaseConfig = {
        apiKey: "AIzaSyABO4zuo6GnSNWld4y0H91VI1QSgQewtRU",
        databaseURL: "https://adminsaunadelfin-default-rtdb.europe-west1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let selectedSauna = null;

    // 2. ХОНАЛАРНИ FIREBASE'ДАН ОЛИШ
    db.ref('rooms/').on('value', (snapshot) => {
        const rooms = snapshot.val();
        const container = document.getElementById('sauna-btns');
        if(!container) return;
        container.innerHTML = '';
        for (let i = 1; i <= 5; i++) {
            const id = 's' + i;
            const status = (rooms && rooms[id]) ? rooms[id].status : 'БЎШ';
            const isBusy = (status === 'БАНД');
            const btn = document.createElement('button');
            btn.className = 's-btn ' + (isBusy ? 'busy' : 'free');
            if (selectedSauna == i) btn.classList.add('selected');
            btn.innerText = i + (isBusy ? " БАНД" : " БЎШ");
            btn.disabled = isBusy;
            btn.onclick = () => {
                selectedSauna = i;
                document.querySelectorAll('.s-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            };
            container.appendChild(btn);
        }
    });

    // 3. БУЮРТМА ЮБОРИШ
    function sendOrder() {
        const name = document.getElementById('u-name').value;
        const phone = document.getElementById('u-phone').value;
        const food = document.getElementById('food-room').value;
        const massage = document.getElementById('massage-service').value; 
        const time = document.getElementById('u-time').value;
        const count = document.getElementById('u-count').value;

        if (!selectedSauna || !name || !phone) { 
            alert("Маълумотларни тўлиқ киритинг!"); 
            return; 
        }

        const token = "8762282587:AAETc9himSsrW1XiSR5UVAdvrwS3s9l55F4";
        const chat_id = "-1001273563663"; 

        const message = `<b>🚀 ЯНГИ БУЮРТМА (DELPHINE)</b>\n\n` +
                        `🏠 <b>Сауна:</b> ${selectedSauna}-хона\n` +
                        `👤 <b>Мижоз:</b> ${name}\n` +
                        `📞 <b>Тел:</b> ${phone}\n` +
                        `💆‍♂️ <b>Массаж:</b> ${massage}\n` +
                        `🍽 <b>Ошхона:</b> ${food}\n` +
                        `⏰ <b>Вақт:</b> ${time}\n` +
                        `👥 <b>Киши:</b> ${count}`;

        const url = `https://api.telegram.org/bot${token}/sendMessage`;

        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: chat_id,
                text: message,
                parse_mode: 'HTML'
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.ok) {
                alert("Раҳмат " + name + "! Буюртма каналга юборилди.");
                window.location.href = "index.html";
            } else {
                alert("Хато: " + data.description);
            }
        })
        .catch(err => alert("Алоқа хатоси!"));
    }
</script>
</body>
</html>
