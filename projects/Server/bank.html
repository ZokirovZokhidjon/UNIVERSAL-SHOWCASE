<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тўлов амалга ошириш | MedLife</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --bg: #f0f2f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); padding: 20px; }

        .payment-card {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .payment-header {
            background: var(--primary);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .payment-body { padding: 30px; }

        .method-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .method {
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .method img { width: 60px; height: auto; display: block; margin: 0 auto 10px; }

        .method.active {
            border-color: var(--accent);
            background: rgba(52, 152, 219, 0.05);
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: #666; }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .price-display {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pay-btn {
            width: 100%;
            background: var(--success);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .pay-btn:hover { background: #219150; transform: translateY(-2px); }

        .secure-note {
            text-align: center;
            font-size: 0.75rem;
            color: #999;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="home">
    <h3><a href="index.html">Асосий сахифага</a></h3>
</div>
<style>
    .home{
        background-color: #2c3e50;
        width: 200px;
        height: 50px;
        margin-left: 10px;
        border-radius: 150px;
        border-style: groove;
        border-color: gold;
        box-shadow: 3px 5px 8px;
        
    }
.home a{
    text-decoration: solid;
    margin-left: 15px;
    font-family: Georgia, 'Times New Roman', Times, serif;
    color: rgb(226, 190, 123);
}
</style>
    <div class="payment-card">
        <div class="payment-header">
            <h2>Хизмат учун тўлов</h2>
            <p>Хавфсиз тўлов тизими</p>
        </div>

        <div class="payment-body">
            <label>Тўлов усулини танланг</label>
            <div class="method-selector">
                <div class="method active" onclick="selectMethod(this)">
                    <img src="https://click.uz/uploads/20260121/ainv19440a2b78f765967492cddd0628422c1769005541.jpg" alt="Click">
                    <span>Click</span>
                </div>
                <div class="method" onclick="selectMethod(this)">
                    <img src="https://cdn.payme.uz/payme-logos/ico/p/1/apple-touch-icon.png" alt="Payme">
                    <span>Payme</span>
                    
                </div>
            </div>

            <div class="input-group">
                <label>Ф.И.Ш. (Тўловчи)</label>
                <input type="text" placeholder="Масалан: Исломов Анвар">
            </div>

            <div class="input-group">
                <label>Тўлов миқдори (Сўм)</label>
                <input type="number" value="150000">
            </div>

            <div class="price-display">
                <span>Жами:</span>
                <strong style="font-size: 1.2rem; color: var(--primary);">150 000 сўм</strong>
            </div>

            <button class="pay-btn" onclick="processPayment()">Тўловни тасдиқлаш</button>

            <div class="secure-note">
                🔒 Сизнинг маълумотларингиз шифрланган ҳолда ҳимояланади.
            </div>
        </div>
    </div>

    <script>
        function selectMethod(element) {
            // Барча методлардан 'active' классини олиб ташлаш
            document.querySelectorAll('.method').forEach(m => m.classList.remove('active'));
            // Танланган методга 'active' классини қўшиш
            element.classList.add('active');
        }

        function processPayment() {
            // Бу ерда реал тўлов тизимига йўналтириш коди бўлади
            const amount = document.querySelector('input[type="number"]').value;
            alert(amount + ' сўм миқдоридаги тўлов сўрови юборилди. Илтимос, телефонингиздаги илова орқали тасдиқланг.');
        }
    </script>

</body>
</html>
