 <!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Design | Шахсий Кабинет</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #050505; color: #ffd700; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; padding: 20px; }
        #loginBox { background: #111; padding: 30px; border: 2px solid #32cd32; border-radius: 15px; text-align: center; width: 320px; }
        #loginBox input { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #32cd32; color: #fff; border-radius: 5px; text-align: center; font-size: 18px; }
        #loginBox button { width: 100%; padding: 12px; background: #32cd32; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #mainContent { display: none; width: 100%; max-width: 850px; }
        .worker-card { background: #111; border: 2px solid #32cd32; border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .section-title { font-size: 14px; color: #32cd32; font-weight: bold; margin: 20px 0 10px; text-transform: uppercase; }
        .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        input { padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; flex: 1; }
        button { padding: 8px 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 13px; }
        .btn-add { background: #32cd32; color: #000; }
        .btn-edit { background: #3498db; color: #fff; margin-right: 5px; }
        .btn-del { background: #e74c3c; color: #fff; }
        .btn-logout { background: #e74c3c; color: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: #eee; font-size: 14px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        th { background: #222; color: #32cd32; }
        .summary { margin-top: 20px; padding: 15px; background: #000; border-radius: 8px; display: flex; justify-content: space-around; font-size: 1.1rem; font-weight: bold; border: 1px solid #333; }
        .export-btn { width: 100%; margin-top: 20px; background: #217346; color: #fff; padding: 15px; font-size: 16px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="loginBox">
        <h2>Тизимга кириш</h2>
        <input type="password" id="passInput" placeholder="Паролни киритинг...">
        <button onclick="checkLogin()">КИРИШ</button>
        <p id="errorMsg" style="color: #e74c3c; margin-top: 10px; display: none;">Пароль хато!</p>
    </div>

    <div id="mainContent">
        <div class="worker-card">
            <div class="header-row">
                <h1 id="activeWorkerName" style="color: #fff;"></h1>
                <button class="btn-logout" onclick="location.reload()">ЧИҚИШ</button>
            </div>

            <div class="section-title">💵 Кунлик Тушум</div>
            <div class="input-group">
                <input type="number" id="cashVal" placeholder="Сумма...">
                <button class="btn-add" onclick="saveData('cash')">Қўшиш</button>
            </div>
            <table id="cashTable">
                <thead><tr><th>Вақт</th><th>Сумма</th><th>Амал</th></tr></thead>
                <tbody></tbody>
            </table>

            <div class="section-title">⚠️ Қарздорлар</div>
            <div class="input-group">
                <input type="text" id="dName" placeholder="Мижоз исми...">
                <input type="number" id="dSum" placeholder="Қарз суммаси...">
                <button class="btn-add" style="background:#f1c40f" onclick="saveData('debt')">Ёзиш</button>
            </div>
            <table id="debtTable">
                <thead><tr><th>Мижоз</th><th>Қарз суммаси</th><th>Амал</th></tr></thead>
                <tbody></tbody>
            </table>

            <div class="summary">
                <span>Жами Тушум: <span id="totalC" style="color:#32cd32">0</span></span>
                <span>Жами Қарз: <span id="totalD" style="color:#f1c40f">0</span></span>
            </div>

            <button class="export-btn" onclick="exportAndClear()">📥 EXCELГА ЮКЛАШ ВА ТОЗАЛАШ</button>
        </div>
    </div>

<script>
    let currentUser = "";

    function checkLogin() {
        const pass = document.getElementById('passInput').value;
        if (pass === "1111") { currentUser = "alisher"; }
        else if (pass === "2222") { currentUser = "botir"; }
        else { document.getElementById('errorMsg').style.display = "block"; return; }

        document.getElementById('loginBox').style.display = "none";
        document.getElementById('mainContent').style.display = "block";
        document.getElementById('activeWorkerName').innerText = currentUser.toUpperCase();
        refreshUI();
    }

    function saveData(type) {
        if (type === 'cash') {
            const val = parseFloat(document.getElementById('cashVal').value);
            if (!val) return;
            let data = JSON.parse(localStorage.getItem(`cash_${currentUser}`)) || [];
            data.push({ amount: val, time: new Date().toLocaleTimeString() });
            localStorage.setItem(`cash_${currentUser}`, JSON.stringify(data));
            document.getElementById('cashVal').value = '';
        } else {
            const name = document.getElementById('dName').value;
            const sum = parseFloat(document.getElementById('dSum').value);
            if (!name || !sum) return;
            let data = JSON.parse(localStorage.getItem(`debt_${currentUser}`)) || [];
            data.push({ name: name, amount: sum });
            localStorage.setItem(`debt_${currentUser}`, JSON.stringify(data));
            document.getElementById('dName').value = '';
            document.getElementById('dSum').value = '';
        }
        refreshUI();
    }

    function refreshUI() {
        const cashData = JSON.parse(localStorage.getItem(`cash_${currentUser}`)) || [];
        const debtData = JSON.parse(localStorage.getItem(`debt_${currentUser}`)) || [];

        let totalC = 0;
        let cashBody = "";
        cashData.forEach((item, index) => {
            totalC += item.amount;
            cashBody += `<tr><td>${item.time}</td><td>${item.amount.toLocaleString()}</td>
                <td><button class="btn-del" onclick="deleteItem('cash', ${index})">✕</button></td></tr>`;
        });
        document.querySelector('#cashTable tbody').innerHTML = cashBody;
        document.getElementById('totalC').innerText = totalC.toLocaleString();

        let totalD = 0;
        let debtBody = "";
        debtData.forEach((item, index) => {
            totalD += item.amount;
            debtBody += `<tr><td>${item.name}</td><td>${item.amount.toLocaleString()}</td>
                <td><button class="btn-del" onclick="deleteItem('debt', ${index})">✕</button></td></tr>`;
        });
        document.querySelector('#debtTable tbody').innerHTML = debtBody;
        document.getElementById('totalD').innerText = totalD.toLocaleString();
    }

    function deleteItem(type, index) {
        let data = JSON.parse(localStorage.getItem(`${type}_${currentUser}`));
        data.splice(index, 1);
        localStorage.setItem(`${type}_${currentUser}`, JSON.stringify(data));
        refreshUI();
    }

    function exportAndClear() {
        const cashData = JSON.parse(localStorage.getItem(`cash_${currentUser}`)) || [];
        const debtData = JSON.parse(localStorage.getItem(`debt_${currentUser}`)) || [];
        
        const wb = XLSX.utils.book_new();
        const wsCash = XLSX.utils.json_to_sheet(cashData);
        const wsDebt = XLSX.utils.json_to_sheet(debtData);
        XLSX.utils.book_append_sheet(wb, wsCash, "Тушум");
        XLSX.utils.book_append_sheet(wb, wsDebt, "Қарзлар");
        XLSX.writeFile(wb, `${currentUser}_hisobot.xlsx`);

        if(confirm("Маълумотлар Excelга юкланди. Сайтни тозалаймизми?")) {
            localStorage.removeItem(`cash_${currentUser}`);
            localStorage.removeItem(`debt_${currentUser}`);
            refreshUI();
        }
    }
</script>
</body>
</html>
