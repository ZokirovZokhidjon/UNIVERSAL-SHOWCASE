<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Алоқа | Буюртма бериш</title>
    <style>
        /* АСОСИЙ СТИЛЛАР */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            height: 100vh;
            background-color: #0a0a0a; /* Қорамтир фон */
            display: flex;
            flex-direction: column;
            color: #ffd700; /* Gold (олтин) матн ранги */
        }

        /* МЕНЮ */
        header {
            background: #000;
            padding: 20px;
            border-bottom: 2px solid #32cd32; /* Салат рангли чизиқ */
            text-align: center;
        }
        nav ul { list-style: none; display: flex; justify-content: center; gap: 30px; }
        nav ul li a { color: #fff; text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 14px; transition: 0.3s; }
        nav ul li a:hover { color: #32cd32; }

        /* КОНТАКТ КАРТАЛАРИ КОНТЕЙНЕРИ */
        .contact-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
            padding: 20px;
        }

        /* КАРТА СТИЛИ */
        .contact-card {
            background: #111; /* Қорамтир кард фон */
            border: 2px solid #32cd32; /* Салат рангли чизиқлар */
            border-radius: 15px;
            width: 300px;
            padding: 40px 20px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-decoration: none; /* Линк учун */
        }

        .contact-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 20px rgba(50, 205, 50, 0.4);
        }

        .icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
        }

        .card-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffd700; /* Gold */
            text-transform: uppercase;
        }

        .card-desc {
            font-size: 16px;
            color: #e0e0e0;
            margin-bottom: 20px;
        }

        .action-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #32cd32;
            color: #000;
            font-weight: bold;
            border-radius: 5px;
            text-decoration: none;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: #ffd700;
            color: #000;
        }

        /* МОБИЛ МОСЛАШУВ */
        @media (max-width: 700px) {
            .contact-container { gap: 20px; }
            .contact-card { width: 100%; max-width: 320px; }
        }
    </style>
</head>
