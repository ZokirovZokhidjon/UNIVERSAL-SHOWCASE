 <!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qulay Bozor - Firebase Pro Max</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --blue: #0088cc; --green: #27ae60; --red: #e74c3c; --dark: #222529; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--dark); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        header a { color: white; text-decoration: none; font-size: 14px; border: 1px solid white; padding: 5px 10px; border-radius: 5px; }
        .stat-box { display: flex; gap: 20px; }
        .stat-item { text-align: center; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 5px; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 320px; background: white; border-right: 1px solid #ddd; padding: 20px; overflow-y: auto; }
        .main { flex: 1; padding: 20px; overflow-y: auto; }
        .nav { display: flex; gap: 5px; margin-bottom: 20px; }
        .nav button { flex: 1; padding: 12px; border: none; background: #eee; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .nav button.active { background: var(--blue); color: white; }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        .del-btn { background: none; border: none; color: var(--red); cursor: pointer; font-size: 18px; }
        .pay-btn { background: var(--green); color: white; border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; }
        .date-text { font-size: 11px; color: #888; display: block; }
        
        #reader { width: 100%; background: #000; border-radius: 10px; margin-bottom: 15px; display: none; }
        
        /* Қарзлар учун махсус ранглар */
        .row-mijoz { background-color: #1b5e20 !important; color: white !important; }
        .row-dukon { background-color: #000000 !important; color: white !important; }
        .row-mijoz td, .row-dukon td { border-bottom: 1px solid #444; }
        .row-mijoz .date-text, .row-dukon .date-text { color: #ccc; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 22px; font-weight: bold;">QULAY BOZOR | РАҲБАР</div>
    <a href="index.html">АСОСИЙ САҲИФА</a>
    <div class="stat-box">
        <div class="stat-item"><small>Савдо</small><br><strong id="st-sales">0</strong></div>
        <div class="stat-item"><small>Қарз</small><br><strong id="st-debts" style="color: #ff7675;">0</strong></div>
    </div>
</header>

<div class="container">
    <div class="sidebar">
        <div class="nav">
            <button id="tab-kassa" class="active" onclick="showTab('kassa')">КАССА</button>
            <button id="tab-ombor" onclick="showTab('ombor')">ОМБОР</button>
            <button id="tab-qarz" onclick="showTab('qarz')">ҚАРЗЛАР</button>
        </div>
        
        <div id="reader"></div>
        <button id="btn-scan" class="btn" style="background: #555;" onclick="toggleScanner()">📷 СКАНЕРНИ ЁҚИШ</button>

        <div id="f-kassa">
            <input type="text" id="k-name" placeholder="Товар номи ёки Коди" class="form-group">
            <input type="number" id="k-qty" value="1" class="form-group">
            <input type="number" id="k-price" placeholder="Нархи" class="form-group">
            <button class="btn" style="background: var(--blue);" onclick="processSale()">СОТТИРИШ</button>
        </div>

        <div id="f-ombor" style="display:none">
            <input type="text" id="o-name" placeholder="Янги товар номи ёки Коди" class="form-group">
            <input type="number" id="o-sell" placeholder="Сотиш нархи" class="form-group">
            <button class="btn" style="background: var(--green);" onclick="addToInventory()">ОМБОРГА ҚЎШИШ</button>
        </div>

        <div id="f-qarz" style="display:none">
            <input type="text" id="q-name" placeholder="Кимга (исми)" class="form-group">
            <input type="number" id="q-amount" placeholder="Қарз суммаси" class="form-group">
            <select id="q-type" class="form-group">
                <option value="mijoz">Мижоз қарзи</option>
                <option value="dukon">Дўкон қарзи</option>
            </select>
            <button class="btn" style="background: var(--red);" onclick="registerDebt()">ҚАРЗ ЁЗИШ</button>
        </div>
    </div>

    <div class="main">
        <table id="main-table">
            <thead id="t-head"></thead>
            <tbody id="t-body"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAt5qPDDjM8o1sFw9zJ2PCA8Md1Su2zybs",
        authDomain: "qulaybozor-16d03.firebaseapp.com",
        databaseURL: "https://qulaybozor-16d03-default-rtdb.firebaseio.com",
        projectId: "qulaybozor-16d03",
        storageBucket: "qulaybozor-16d03.appspot.com",
        messagingSenderId: "74069372632",
        appId: "1:74069372632:web:5570f635dd1227434b71ad"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentTab = 'kassa';
    let html5QrCode;

    function toggleScanner() {
        const reader = document.getElementById('reader');
        if (reader.style.display === 'none' || reader.style.display === '') {
            reader.style.display = 'block';
            document.getElementById('btn-scan').innerText = "🛑 СКАНЕРНИ ЎЧИРИШ";
            startScanner();
        } else {
            stopScanner();
        }
    }

    function startScanner() {
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 150 } },
            (decodedText) => {
                if (currentTab === 'kassa') document.getElementById('k-name').value = decodedText;
                else if (currentTab === 'ombor') document.getElementById('o-name').value = decodedText;
                stopScanner();
            }
        ).catch(err => console.error(err));
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('btn-scan').innerText = "📷 СКАНЕРНИ ЁҚИШ";
            });
        }
    }

    function showTab(name) {
        currentTab = name;
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        document.querySelectorAll('.sidebar div[id^="f-"]').forEach(f => f.style.display = 'none');
        document.getElementById('f-' + name).style.display = 'block';
        loadRealtimeData();
    }

    function getNow() {
        const d = new Date();
        return `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    }

    function loadRealtimeData() {
        const path = (currentTab === 'kassa') ? 'sales' : (currentTab === 'ombor' ? 'stock' : 'debts');
        db.ref(path).on('value', (snap) => {
            const data = snap.val() ? Object.entries(snap.val()).map(([id, val]) => ({...val, id})) : [];
            renderTable(data);
        });

        db.ref('sales').on('value', s => {
            let total = 0; if(s.val()) Object.values(s.val()).forEach(v => total += v.total);
            document.getElementById('st-sales').innerText = total.toLocaleString() + " сўм";
        });
        db.ref('debts').on('value', d => {
            let total = 0; if(d.val()) Object.values(d.val()).forEach(v => total += v.amount);
            document.getElementById('st-debts').innerText = total.toLocaleString() + " сўм";
        });
    }

    function renderTable(list) {
        const body = document.getElementById('t-body');
        const head = document.getElementById('t-head');
        body.innerHTML = "";
        
        if(currentTab === 'kassa') {
            head.innerHTML = "<tr><th>Вақт / Товар</th><th>Жами</th><th>🗑️</th></tr>";
            list.reverse().forEach(s => body.innerHTML += `<tr><td><span class="date-text">${s.date}</span>${s.name}</td><td>${s.total.toLocaleString()}</td><td><button class="del-btn" onclick="deleteItem('sales','${s.id}')">×</button></td></tr>`);
        } else if(currentTab === 'ombor') {
            head.innerHTML = "<tr><th>Товар номи</th><th>Сотиш</th><th>🗑️</th></tr>";
            list.forEach(i => body.innerHTML += `<tr><td>${i.name}</td><td>${i.sell.toLocaleString()}</td><td><button class="del-btn" onclick="deleteItem('stock','${i.id}')">×</button></td></tr>`);
        } else {
            head.innerHTML = "<tr><th>Исм / Сана / Тур</th><th>Сумма</th><th>Амал</th></tr>";
            list.forEach(d => {
                const rowClass = d.type === 'mijoz' ? 'row-mijoz' : 'row-dukon';
                const typeLabel = d.type === 'mijoz' ? 'МИЖОЗ' : 'ДЎКОН';
                body.innerHTML += `<tr class="${rowClass}">
                    <td><span class="date-text">${d.date}</span><b>${d.name}</b> <small>(${typeLabel})</small></td>
                    <td style="font-weight:bold; color: #fffa65;">${d.amount.toLocaleString()}</td>
                    <td><button class="pay-btn" onclick="makePayment('${d.id}', ${d.amount}, '${d.name}')">Тўлов</button>
                    <button class="del-btn" style="color: white;" onclick="deleteItem('debts','${d.id}')">×</button></td></tr>`;
            });
        }
    }

    function deleteItem(path, id) {
        if(confirm("Бу маълумотни ўчирмоқчимисиз?")) db.ref(path + '/' + id).remove();
    }

    function makePayment(id, currentAmount, name) {
        const pay = parseFloat(prompt(`"${name}" учун тўлов (Жорий: ${currentAmount}):`));
        if(!pay || pay <= 0) return;
        if(pay >= currentAmount) db.ref('debts/' + id).remove();
        else db.ref('debts/' + id).update({ amount: currentAmount - pay });
    }

    function processSale() {
        const name = document.getElementById('k-name').value;
        const qty = parseFloat(document.getElementById('k-qty').value);
        const price = parseFloat(document.getElementById('k-price').value);
        if(!name || !price) return;
        db.ref('sales').push({ name, total: qty * price, date: getNow() });
        document.getElementById('k-name').value = "";
    }

    function registerDebt() {
        const name = document.getElementById('q-name').value;
        const amount = parseFloat(document.getElementById('q-amount').value);
        const type = document.getElementById('q-type').value;
        if(!name || !amount) return;
        db.ref('debts').push({ name, amount, type, date: getNow() });
        document.getElementById('q-name').value = ""; document.getElementById('q-amount').value = "";
    }

    function addToInventory() {
        const name = document.getElementById('o-name').value;
        const sell = parseFloat(document.getElementById('o-sell').value);
        if(!name || !sell) return;
        db.ref('stock').push({ name, sell });
        document.getElementById('o-name').value = ""; document.getElementById('o-sell').value = "";
    }

    loadRealtimeData();
</script>
</body>
</html>
