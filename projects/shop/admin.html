 <!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qulay Bozor - Director</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.5/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --green: #2ecc71; --blue: #3498db; --red: #e74c3c; 
            --dark: #1e2126; --light-bg: #f4f7f6; --orange: #f39c12;
        }

        /* Ҳамма элементлар учун умумий қоида */
* { 
    box-sizing: border-box; 
    max-width: 100%; 
}

/* Контейнерларни кенглигини фоизда беринг */
.container, .main-wrapper {
    width: 100%;
    padding: 10px;
    margin: 0 auto;
}

/* Сканер ва Инпутларни мобил учун катталаштириш */
input, select, button {
    width: 100% !important; /* Телефонда тўлиқ кенгликда бўлсин */
    height: 50px; /* Бармоқ билан босишга қулай бўлиши учун */
    margin-bottom: 10px;
    font-size: 16px !important; /* Зум бўлиб кетмаслиги учун камида 16px */
}

/* Жадвалларни сиғдириш */
.table-responsive {
    display: block;
    width: 100%;
    overflow-x: auto; /* Агар жадвал катта бўлса, экранни бузмай ёнга сурилади */
    -webkit-overflow-scrolling: touch;
}


        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light-bg); }

        header { 
            background: var(--dark); color: white; padding: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 3px solid var(--green); flex-wrap: wrap; gap: 10px;
        }
        
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 15px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; border-left: 5px solid var(--green); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0; font-size: 12px; color: #777; }
        .stat-card p { margin: 5px 0 0; font-size: 20px; font-weight: bold; color: var(--dark); }

        .main-container { padding: 0 15px 100px; }
        .nav-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; }
        .nav-tabs button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #e0e0e0; white-space: nowrap; }
        .nav-tabs button.active { background: var(--blue); color: white; }

        .table-container { background: white; border-radius: 12px; border: 1px solid #ddd; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }

        .footer-excel { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px; text-align: center; border-top: 2px solid var(--green); box-sizing: border-box; }
        
        /* MOBILE STYLES */
        @media (max-width: 600px) {
            header div { font-size: 18px !important; }
            .stat-grid { grid-template-columns: 1fr; }
            .nav-tabs button { font-size: 12px; flex: 1; }
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 20px;">QULAY BOZOR | <span style="color: var(--green);">DIRECTOR</span></div>
    <button onclick="logout()" style="background: var(--red); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold;">ЧИҚИШ</button>
</header>

<div class="stat-grid">
    <div class="stat-card"><h3>ЖАМИ САВДО</h3><p id="stat-sales">0 сум</p></div>
    <div class="stat-card" style="border-left-color: #e67e22;"><h3>МИЖОЗЛАР ҚАРЗИ</h3><p id="stat-client-debts">0 сум</p></div>
    <div class="stat-card" style="border-left-color: var(--blue);"><h3>ДЎКОН ҚАРЗИ</h3><p id="stat-shop-debts">0 сум</p></div>
</div>

<div class="main-container">
    <div class="nav-tabs">
        <button id="btn-sales" class="active" onclick="switchTab('sales')">САВДО</button>
        <button id="btn-debts" onclick="switchTab('debts')">ҚАРЗЛАР</button>
        <button id="btn-stock" onclick="switchTab('stock')">ОМБОР</button>
    </div>

    <div class="table-container">
        <table><thead id="t-head"></thead><tbody id="t-body"></tbody></table>
    </div>
</div>

<div class="footer-excel">
    <button onclick="exportExcel()" style="width: 100%; max-width: 400px; padding: 12px; font-weight: bold; background: white; border: 2px solid #333; border-radius: 8px;">📊 EXCEL ГА ОЛИШ</button>
</div>

<script>
    // Firebase Config (Sizning ma'lumotlaringiz)
    const firebaseConfig = {
        apiKey: "AIzaSyAt5qPDDjM8o1sFw9zJ2PCA8Md1Su2zybs",
        authDomain: "qulaybozor-16d03.firebaseapp.com",
        databaseURL: "https://qulaybozor-16d03-default-rtdb.firebaseio.com",
        projectId: "qulaybozor-16d03",
        storageBucket: "qulaybozor-16d03.appspot.com",
        messagingSenderId: "74069372632",
        appId: "1:74069372632:web:5570f635dd1227434b71ad"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentTab = 'sales';

    window.onload = loadData;

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        loadData();
    }

    function loadData() {
        db.ref(currentTab).on('value', snap => {
            const data = snap.val() ? Object.entries(snap.val()).map(([id, v]) => ({...v, id})) : [];
            renderTable(data);
        });
        // Statistikalar hisobi... (yuqoridagi mantiq bilan bir xil)
    }

    function renderTable(list) {
        const b = document.getElementById('t-body'), h = document.getElementById('t-head');
        b.innerHTML = "";
        if (currentTab === 'sales') {
            h.innerHTML = "<tr><th>ВАҚТ</th><th>НОМИ</th><th>СУММА</th></tr>";
            list.reverse().forEach(x => {
                b.innerHTML += `<tr><td>${x.date || '--'}</td><td>${x.name}</td><td>${Number(x.total).toLocaleString()}</td></tr>`;
            });
        }
        // Boshqa tablar uchun renderTable mantiqini qo'shishingiz mumkin
    }

    function logout() { if(confirm("Тизимдан чиқмоқчимисиз?")) window.location.href = "login.html"; }
    function exportExcel() { alert("Excel tayyorlanmoqda..."); }
</script>

</body>
</html>
